<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จัดการห้องประชุม — มีนบุรี</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0f10; --ink2: #1e1e22; --muted: #6b6b7a; --muted2: #9898a8;
      --line: #e4e4ea; --line2: #f0f0f5; --surface: #fafafc; --white: #ffffff;
      --accent: #2a5cff; --accent-bg: #eef2ff;
      --danger: #e84040; --danger-bg: #fff0f0;
      --success: #18b06a; --success-bg: #eafaf3;
      --warn: #f5a623; --warn-bg: #fff8ee;
    }
    body { font-family: 'Sarabun', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; }

    .topbar {
      height: 64px; background: var(--white); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; padding: 0 24px; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); text-decoration: none; }
    .topbar-brand span { color: var(--accent); }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--muted); padding-left: 16px; border-left: 1px solid var(--line); }
    .topbar-spacer { flex: 1; }
    .back-btn {
      padding: 6px 13px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: #bbbbc8; color: var(--ink); }

    .content { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; }
    .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    .btn-primary {
      padding: 9px 18px; border: none; background: var(--accent); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--white); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary:hover { background: #1a46e0; }

    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }

    .room-card {
      background: var(--white); border: 1.5px solid var(--line); border-radius: 12px;
      overflow: hidden; transition: box-shadow 0.15s;
    }
    .room-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .room-card.suspended { opacity: 0.6; }

    .room-card-header {
      padding: 16px 18px 14px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--line2);
    }
    .room-color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.1); }
    .room-card-name { font-size: 16px; font-weight: 700; flex: 1; }
    .status-pill {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }
    .status-pill.active   { background: var(--success-bg); color: var(--success); }
    .status-pill.suspended { background: var(--danger-bg);  color: var(--danger); }

    .room-card-body { padding: 14px 18px; }
    .room-meta-row { display: flex; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
    .room-meta-item { font-size: 13px; color: var(--muted); }
    .room-meta-item strong { color: var(--ink); font-weight: 600; }
    .room-note { font-size: 12px; color: var(--muted2); margin-top: 6px; font-style: italic; }

    .room-card-footer {
      padding: 10px 18px; border-top: 1px solid var(--line2);
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .btn-sm {
      padding: 5px 12px; border-radius: 6px; font-family: 'Sarabun', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1.5px solid var(--line);
      background: var(--white); color: var(--muted);
    }
    .btn-sm:hover { border-color: #bbbbc8; color: var(--ink); }
    .btn-sm.danger { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
    .btn-sm.danger:hover { opacity: 0.75; }
    .btn-sm.success { border-color: var(--success); color: var(--success); background: var(--success-bg); }
    .btn-sm.success:hover { opacity: 0.75; }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,15,16,0.5); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white); border-radius: 16px; width: 460px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
    .modal-header { padding: 20px 22px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
    .modal-close { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--line); background: var(--white); border-radius: 7px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s; }
    .modal-close:hover { border-color: #bbbbc8; color: var(--ink); }
    .modal-body { padding: 18px 22px; }
    .modal-footer { padding: 14px 22px 20px; display: flex; gap: 10px; justify-content: flex-end; }

    .form-row { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .form-input, .form-select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--ink);
      background: var(--white); outline: none; transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

    .color-picker-row { display: flex; align-items: center; gap: 10px; }
    .color-preview { width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--line); flex-shrink: 0; }
    .color-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s;
    }
    .color-swatch:hover, .color-swatch.active { border-color: var(--ink); transform: scale(1.1); }

    .btn-cancel {
      padding: 9px 18px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: #bbbbc8; color: var(--ink); }
    .btn-submit {
      padding: 9px 22px; border: none; background: var(--accent); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--white); cursor: pointer; transition: all 0.15s;
    }
    .btn-submit:hover { background: #1a46e0; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-state { text-align: center; padding: 60px; color: var(--muted2); font-size: 14px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink2); color: var(--white); padding: 11px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .topbar { padding: 0 14px; gap: 10px; height: 56px; }
      .topbar-title { display: none; }
      .topbar-brand { font-size: 15px; }
      .content { padding: 16px 14px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .page-header h1 { font-size: 22px; }
      .btn-primary { width: 100%; text-align: center; }
      .rooms-grid { grid-template-columns: 1fr; }
      .modal { width: 100% !important; max-width: 100% !important; border-radius: 20px 20px 0 0 !important; position: fixed; bottom: 0; left: 0; right: 0; max-height: 92vh; overflow-y: auto; }
      .modal-backdrop { align-items: flex-end; }
      .modal-backdrop .modal { transform: translateY(40px) !important; }
      .modal-backdrop.open .modal { transform: translateY(0) !important; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="room-booking.html" class="topbar-brand">มีนบุรี <span>ห้องประชุม</span></a>
  <div class="topbar-title">🏢 จัดการห้องประชุม</div>
  <div class="topbar-spacer"></div>
  <a href="room-booking.html" class="back-btn">← กลับ</a>
</div>

<div class="content">
  <div class="page-header">
    <div>
      <h1>จัดการห้องประชุม</h1>
      <p>เพิ่ม แก้ไข หรือระงับการใช้งานห้องประชุม</p>
    </div>
    <button class="btn-primary" id="addRoomBtn">+ เพิ่มห้องประชุม</button>
  </div>

  <div id="loadingState" class="loading-state">กำลังโหลด...</div>
  <div class="rooms-grid" id="roomsGrid" style="display:none"></div>
</div>

<!-- ROOM MODAL -->
<div class="modal-backdrop" id="roomModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มห้องประชุม</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">ชื่อห้องประชุม <span style="color:var(--danger)">*</span></label>
        <input class="form-input" id="fName" placeholder="เช่น ห้องประชุม 1" />
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label">ชั้น <span style="color:var(--danger)">*</span></label>
          <input class="form-input" id="fFloor" placeholder="เช่น 5" />
        </div>
        <div>
          <label class="form-label">ความจุ (ที่นั่ง) <span style="color:var(--danger)">*</span></label>
          <input class="form-input" id="fCapacity" type="number" min="1" placeholder="เช่น 20" />
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">สีห้อง</label>
        <div class="color-picker-row">
          <div class="color-preview" id="colorPreview"></div>
          <input class="form-input" id="fColor" style="width:120px" placeholder="#2a5cff" />
        </div>
        <div class="color-presets">
          <div class="color-swatch" style="background:#e84040" data-color="#e84040"></div>
          <div class="color-swatch" style="background:#2a5cff" data-color="#2a5cff"></div>
          <div class="color-swatch" style="background:#18b06a" data-color="#18b06a"></div>
          <div class="color-swatch" style="background:#9b59b6" data-color="#9b59b6"></div>
          <div class="color-swatch" style="background:#f5a623" data-color="#f5a623"></div>
          <div class="color-swatch" style="background:#1abc9c" data-color="#1abc9c"></div>
          <div class="color-swatch" style="background:#e67e22" data-color="#e67e22"></div>
          <div class="color-swatch" style="background:#34495e" data-color="#34495e"></div>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">สถานะ</label>
        <select class="form-select" id="fStatus">
          <option value="active">เปิดใช้งาน</option>
          <option value="suspended">ระงับการใช้งาน</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">หมายเหตุ</label>
        <textarea class="form-input" id="fNote" rows="2" placeholder="เช่น ต้องจองล่วงหน้า 1 วัน" style="resize:vertical;line-height:1.5"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">ยกเลิก</button>
      <button class="btn-submit" id="modalSubmit">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, updateDoc, doc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIoOIk7O-oEt7yCgGGFq4w1ONXUuZBj0g",
  authDomain: "minburi-meeting-room-f34c4.firebaseapp.com",
  projectId: "minburi-meeting-room-f34c4",
  storageBucket: "minburi-meeting-room-f34c4.firebasestorage.app",
  messagingSenderId: "520841331829",
  appId: "1:520841331829:web:ad701c93283cd53b48243c"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const ADMIN_EMAILS = ["civilmbc.techno@gmail.com"];

// ── AUTH ─────────────────────────────────────────────────────
const savedLocal = sessionStorage.getItem("localUser");
if (savedLocal) {
  const u = JSON.parse(savedLocal);
  if (u.role !== "admin") { window.location.href = "room-booking.html"; }
  else { init(); }
} else {
  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = "login.html"; return; }
    if (!ADMIN_EMAILS.includes(user.email)) { window.location.href = "room-booking.html"; return; }
    init();
  });
}

let rooms = [];
let editId = null;

function init() {
  onSnapshot(query(collection(db, "rooms"), orderBy("createdAt")), snap => {
    rooms = [];
    snap.forEach(d => rooms.push({ id: d.id, ...d.data() }));
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("roomsGrid").style.display = "grid";
    renderRooms();
  });
}

// ── RENDER ───────────────────────────────────────────────────
function renderRooms() {
  const grid = document.getElementById("roomsGrid");
  if (!rooms.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted2);font-size:14px">ยังไม่มีห้องประชุม — กด "+ เพิ่มห้องประชุม" เพื่อเริ่มต้น</div>`;
    return;
  }
  grid.innerHTML = rooms.map(r => {
    const color   = r.color || "#888";
    const status  = r.status || "active";
    const isActive = status === "active";
    return `
    <div class="room-card ${status !== "active" ? "suspended" : ""}">
      <div class="room-card-header">
        <div class="room-color-dot" style="background:${esc(color)}"></div>
        <div class="room-card-name">${esc(r.name)}</div>
        <span class="status-pill ${status}">${isActive ? "เปิดใช้งาน" : "ระงับแล้ว"}</span>
      </div>
      <div class="room-card-body">
        <div class="room-meta-row">
          <div class="room-meta-item">🏢 ชั้น <strong>${esc(String(r.floor || "—"))}</strong></div>
          <div class="room-meta-item">💺 ความจุ <strong>${esc(String(r.capacity || "—"))} ที่นั่ง</strong></div>
          <div class="room-meta-item">🎨 สี <strong style="color:${esc(color)}">${esc(color)}</strong></div>
        </div>
        ${r.note ? `<div class="room-note">📝 ${esc(r.note)}</div>` : ""}
      </div>
      <div class="room-card-footer">
        <button class="btn-sm ${isActive ? "danger" : "success"}" data-toggle="${r.id}" data-status="${status}">
          ${isActive ? "🔒 ระงับ" : "✓ เปิดใช้งาน"}
        </button>
        <button class="btn-sm" data-edit="${r.id}">✏️ แก้ไข</button>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll("[data-edit]").forEach(btn => {
    btn.addEventListener("click", () => openModal(btn.dataset.edit));
  });
  grid.querySelectorAll("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => toggleStatus(btn.dataset.toggle, btn.dataset.status));
  });
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(id = null) {
  editId = id;
  const r = id ? rooms.find(x => x.id === id) : null;
  document.getElementById("modalTitle").textContent = id ? "แก้ไขห้องประชุม" : "เพิ่มห้องประชุม";
  document.getElementById("fName").value     = r?.name     || "";
  document.getElementById("fFloor").value    = r?.floor    || "";
  document.getElementById("fCapacity").value = r?.capacity || "";
  document.getElementById("fNote").value     = r?.note     || "";
  document.getElementById("fStatus").value   = r?.status   || "active";
  setColor(r?.color || "#2a5cff");
  document.getElementById("roomModal").classList.add("open");
  setTimeout(() => document.getElementById("fName").focus(), 100);
}

function closeModal() {
  document.getElementById("roomModal").classList.remove("open");
  editId = null;
}

function setColor(hex) {
  document.getElementById("fColor").value = hex;
  document.getElementById("colorPreview").style.background = hex;
  document.querySelectorAll(".color-swatch").forEach(s => {
    s.classList.toggle("active", s.dataset.color === hex);
  });
}

document.getElementById("fColor").addEventListener("input", e => setColor(e.target.value));
document.querySelectorAll(".color-swatch").forEach(s => {
  s.addEventListener("click", () => setColor(s.dataset.color));
});

document.getElementById("addRoomBtn").onclick = () => openModal();
document.getElementById("modalClose").onclick  = closeModal;
document.getElementById("modalCancel").onclick = closeModal;
document.getElementById("roomModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById("modalSubmit").addEventListener("click", async () => {
  const name     = document.getElementById("fName").value.trim();
  const floor    = document.getElementById("fFloor").value.trim();
  const capacity = parseInt(document.getElementById("fCapacity").value) || 0;
  const color    = document.getElementById("fColor").value.trim() || "#2a5cff";
  const status   = document.getElementById("fStatus").value;
  const note     = document.getElementById("fNote").value.trim();

  if (!name)     { toast("กรุณากรอกชื่อห้อง"); document.getElementById("fName").focus(); return; }
  if (!floor)    { toast("กรุณากรอกชั้น"); document.getElementById("fFloor").focus(); return; }
  if (!capacity) { toast("กรุณากรอกความจุ"); document.getElementById("fCapacity").focus(); return; }

  document.getElementById("modalSubmit").disabled = true;
  try {
    const data = { name, floor, capacity, color, status, note, updatedAt: new Date() };
    if (editId) {
      await updateDoc(doc(db, "rooms", editId), data);
      toast("แก้ไขห้องประชุมเรียบร้อยแล้ว ✓");
    } else {
      await addDoc(collection(db, "rooms"), { ...data, createdAt: new Date() });
      toast("เพิ่มห้องประชุมเรียบร้อยแล้ว ✓");
    }
    closeModal();
  } catch (e) {
    console.error(e);
    toast("เกิดข้อผิดพลาด: " + e.message);
  }
  document.getElementById("modalSubmit").disabled = false;
});

async function toggleStatus(id, currentStatus) {
  const newStatus = currentStatus === "active" ? "suspended" : "active";
  const label = newStatus === "suspended" ? "ระงับ" : "เปิดใช้งาน";
  const r = rooms.find(x => x.id === id);
  if (!confirm(`ยืนยัน${label}ห้อง "${r?.name}"?`)) return;
  await updateDoc(doc(db, "rooms", id), { status: newStatus, updatedAt: new Date() });
  toast(`${label}ห้องเรียบร้อยแล้ว ✓`);
}

// ── HELPERS ───────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>

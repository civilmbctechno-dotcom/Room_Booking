<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ประวัติการจอง — มีนบุรี</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f10;
      --ink2: #1e1e22;
      --muted: #6b6b7a;
      --muted2: #9898a8;
      --line: #e4e4ea;
      --line2: #f0f0f5;
      --surface: #fafafc;
      --white: #ffffff;
      --accent: #2a5cff;
      --accent-bg: #eef2ff;
      --danger: #e84040;
      --danger-bg: #fff0f0;
      --success: #18b06a;
      --success-bg: #eafaf3;
      --warn: #f5a623;
      --warn-bg: #fff8ee;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
    }

    .topbar {
      height: 64px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); }
    .topbar-brand span { color: var(--accent); }

    .topbar-title {
      font-size: 14px; font-weight: 600; color: var(--muted);
      padding-left: 16px; border-left: 1px solid var(--line);
    }

    .topbar-spacer { flex: 1; }

    .back-btn {
      padding: 6px 13px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; text-decoration: none;
      transition: all 0.15s; white-space: nowrap;
    }
    .back-btn:hover { border-color: #bbbbc8; color: var(--ink); }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px 5px 5px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 100px; white-space: nowrap;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--white);
      text-transform: uppercase; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; }

    .content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-header p  { font-size: 14px; color: var(--muted); }

    .filters {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-bottom: 20px; align-items: center;
    }

    .filter-group { display: flex; gap: 4px; background: var(--line2); padding: 3px; border-radius: 8px; }

    .filter-btn {
      padding: 6px 13px; border: none; background: transparent; border-radius: 6px;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .search-input {
      padding: 8px 14px; border: 1.5px solid var(--line); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--ink);
      background: var(--white); outline: none; transition: border-color 0.15s; min-width: 220px;
    }
    .search-input:focus { border-color: var(--accent); }

    .room-filter-select {
      padding: 8px 14px; border: 1.5px solid var(--line); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--ink);
      background: var(--white); outline: none; cursor: pointer;
    }

    .filters-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .count-label { font-size: 13px; color: var(--muted2); white-space: nowrap; }

    .table-wrap {
      background: var(--white); border: 1px solid var(--line);
      border-radius: 12px; overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted2);
      background: var(--surface); border-bottom: 1px solid var(--line); white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--line2); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9f9fc; }

    td { padding: 14px 16px; font-size: 14px; vertical-align: middle; }

    .room-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
    .room-cell { display: flex; align-items: center; }
    .title-cell { font-weight: 600; color: var(--ink); }
    .desc-cell  { font-size: 12px; color: var(--muted); margin-top: 2px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-cell  { font-size: 13px; color: var(--muted); }
    .time-cell  { font-size: 13px; color: var(--ink); white-space: nowrap; }
    .time-sub   { font-size: 11px; color: var(--muted2); margin-top: 2px; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge.approved  { background: var(--success-bg); color: var(--success); }
    .badge.pending   { background: var(--warn-bg);    color: var(--warn);    }
    .badge.completed { background: var(--success-bg);      color: var(--success);   }
    .badge.rejected  { background: var(--danger-bg);  color: var(--danger);  }
    .badge.deleted   { background: #f5eeff;           color: #9b59b6;        }
    .badge.active    { background: var(--success-bg); color: var(--success); }
    .badge.incoming  { background: var(--accent-bg);  color: var(--accent);  }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted2); }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .loading-state { text-align: center; padding: 60px; color: var(--muted2); font-size: 14px; }

    .pagination {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; padding: 14px 0;
    }

    .page-btn {
      padding: 6px 12px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 13px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .page-btn:hover:not(:disabled) { border-color: #bbbbc8; color: var(--ink); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .page-info { font-size: 13px; color: var(--muted); white-space: nowrap; padding: 0 4px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink2); color: var(--white);
      padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .topbar { padding: 0 14px; gap: 10px; height: 56px; }
      .topbar-title { display: none; }
      .topbar-brand { font-size: 15px; }
      .user-name { display: none; }
      .content { padding: 16px 14px; }
      .page-header h1 { font-size: 22px; }
      .filters { gap: 8px; }
      .filter-group { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
      .filter-btn { padding: 5px 10px; font-size: 12px; }
      .search-input { min-width: 0; width: 100%; }
      .filters-right { margin-left: 0; width: 100%; }
      .room-filter-select { font-size: 13px; padding: 7px 10px; }

      /* hide table, show cards */
      .table-wrap table { display: none; }
      .mobile-cards { display: block !important; }
    }

    /* mobile card layout */
    .mobile-cards { display: none; }
    .log-card {
      background: var(--white); border: 1px solid var(--line);
      border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .log-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .log-card-title { font-size: 14px; font-weight: 700; color: var(--ink); }
    .log-card-room { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); margin-top: 2px; }
    .log-card-meta { font-size: 12px; color: var(--muted); line-height: 1.8; }
    .log-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--line2); }
    .log-card-time { font-size: 11px; color: var(--muted2); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="room-booking.html" class="topbar-brand" style="text-decoration:none">มีนบุรี <span>ห้องประชุม</span></a>
  <div class="topbar-title">📋 ประวัติการจอง</div>
  <div class="topbar-spacer"></div>
  <div class="user-chip" id="userChip" style="display:none">
    <div class="user-avatar" id="userAvatar"></div>
    <span class="user-name" id="userName"></span>
  </div>
  <a href="room-booking.html" class="back-btn">← กลับ</a>
</div>

<div class="content">
  <div class="page-header">
    <h1>ประวัติการจอง</h1>
    <p>บันทึกคำขอและสถานะการจองห้องประชุมทั้งหมด</p>
  </div>

  <div class="filters">
    <div class="filter-group" id="statusFilters">
      <button class="filter-btn active" data-status="all">ทั้งหมด</button>
      <button class="filter-btn" data-status="pending">รออนุมัติ</button>
      <button class="filter-btn" data-status="approved">อนุมัติแล้ว</button>
      <button class="filter-btn" data-status="completed">เสร็จสิ้น</button>
      <button class="filter-btn" data-status="rejected">ปฏิเสธ</button>
      <button class="filter-btn" data-status="deleted">ลบแล้ว</button>
    </div>

    <select class="room-filter-select" id="roomFilter">
      <option value="all">ทุกห้อง</option>
      <option value="1">ห้องประชุม 1</option>
      <option value="2">ห้องประชุม 2</option>
      <option value="3">ห้องประชุม 3</option>
      <option value="4">ห้องสมัครสโมสร</option>
    </select>

    <input type="date" class="room-filter-select" id="dateFilter" title="กรองตามวันที่" />

    <div class="filters-right">
      <input class="search-input" id="searchInput" placeholder="🔍 ค้นหาชื่อ หรือ email..." />
      <span class="count-label" id="countLabel">—</span>
    </div>
  </div>

  <div id="paginationTop"></div>

  <div class="table-wrap">
    <div class="loading-state" id="loadingState">กำลังโหลด...</div>
    <table id="logsTable" style="display:none">
      <thead>
        <tr>
          <th>ชื่อการประชุม</th>
          <th>ห้อง</th>
          <th>วันที่ / เวลา</th>
          <th>ผู้จอง</th>
          <th>ศาล / หน่วยงาน</th>
          <th>เบอร์โทร</th>
          <th>สถานะ</th>
          <th>บันทึกเมื่อ</th>
        </tr>
      </thead>
      <tbody id="logsBody"></tbody>
    </table>
    <div class="mobile-cards" id="mobileCards"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">📭</div>
      <p>ไม่พบรายการที่ตรงกับเงื่อนไข</p>
    </div>
  </div>

  <div id="paginationBottom"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIoOIk7O-oEt7yCgGGFq4w1ONXUuZBj0g",
  authDomain: "minburi-meeting-room-f34c4.firebaseapp.com",
  projectId: "minburi-meeting-room-f34c4",
  storageBucket: "minburi-meeting-room-f34c4.firebasestorage.app",
  messagingSenderId: "520841331829",
  appId: "1:520841331829:web:ad701c93283cd53b48243c"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAILS = ["civilmbc.techno@gmail.com"];

const ROOM_META = {
  "1": { name: "ห้องประชุม 1",    color: "#e84040" },
  "2": { name: "ห้องประชุม 2",    color: "#2a5cff" },
  "3": { name: "ห้องประชุม 3",    color: "#18b06a" },
  "4": { name: "ห้องสมัครสโมสร", color: "#9b59b6" }
};

const MONTH_NAMES = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.",
                     "ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

const PAGE_SIZE = 15;

let allLogs      = [];
let activeStatus = "all";
let activeRoom   = "all";
let activeDate   = "";
let searchQuery  = "";
let currentPage  = 1;

// ── AUTH ─────────────────────────────────────────────────────
// Check local session first
const savedLocal = sessionStorage.getItem("localUser");
if (savedLocal) {
  const localUser = JSON.parse(savedLocal);
  if (localUser.role !== "admin") {
    window.location.href = "room-booking.html";
  } else {
    document.getElementById("userChip").style.display = "flex";
    document.getElementById("userAvatar").textContent = localUser.displayName[0].toUpperCase();
    document.getElementById("userName").textContent   = localUser.displayName;
    loadLogs();
  }
} else {
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    if (!ADMIN_EMAILS.includes(user.email)) {
      window.location.href = "room-booking.html"; return;
    }
    document.getElementById("userChip").style.display = "flex";
    document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
    document.getElementById("userName").textContent   = user.email.split("@")[0];
    loadLogs();
  });
}

// ── LOAD ─────────────────────────────────────────────────────
async function loadLogs() {
  try {
    const snap = await getDocs(query(collection(db, "bookings"), orderBy("createdAt", "desc")));
    allLogs = [];
    snap.forEach(d => {
      const data = d.data();
      allLogs.push({
        id: d.id, ...data,
        start:      toDate(data.start),
        end:        toDate(data.end),
        createdAt:  toDate(data.createdAt),
        endedAt:    data.endedAt    ? toDate(data.endedAt)    : null,
        rejectedAt: data.rejectedAt ? toDate(data.rejectedAt) : null,
        deletedAt:  data.deletedAt  ? toDate(data.deletedAt)  : null,
      });
    });

    // hide loading, show table
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("logsTable").style.display    = "table";
    renderTable();
  } catch (e) {
    console.error(e);
    document.getElementById("loadingState").textContent = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
  }
}

function toDate(v) {
  if (!v) return null;
  return v?.toDate ? v.toDate() : new Date(v);
}

// ── FILTER ───────────────────────────────────────────────────
function getFiltered() {
  return allLogs.filter(b => {
    if (activeStatus !== "all" && b.status !== activeStatus) return false;
    if (activeRoom   !== "all" && b.room   !== activeRoom)   return false;
    if (activeDate && b.start) {
      const d   = b.start;
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      if (iso !== activeDate) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!(b.title?.toLowerCase().includes(q) || b.user?.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

// ── PAGINATION ────────────────────────────────────────────────
function paginationHTML(totalPages) {
  return `
    <div class="pagination">
      <button class="page-btn" data-action="first" ${currentPage === 1 ? "disabled" : ""}>« หน้าแรก</button>
      <button class="page-btn" data-action="prev"  ${currentPage === 1 ? "disabled" : ""}>‹ ก่อนหน้า</button>
      <span class="page-info">หน้า ${currentPage} / ${totalPages}</span>
      <button class="page-btn" data-action="next"  ${currentPage === totalPages ? "disabled" : ""}>ถัดไป ›</button>
      <button class="page-btn" data-action="last"  ${currentPage === totalPages ? "disabled" : ""}>หน้าสุดท้าย »</button>
    </div>
  `;
}

function attachPagination(totalPages) {
  document.querySelectorAll(".page-btn[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      if (action === "first") currentPage = 1;
      if (action === "prev"  && currentPage > 1)          currentPage--;
      if (action === "next"  && currentPage < totalPages) currentPage++;
      if (action === "last")  currentPage = totalPages;
      renderTable();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

// ── RENDER TABLE ─────────────────────────────────────────────
function renderTable() {
  const filtered   = getFiltered();
  const total      = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

  // clamp page
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1)          currentPage = 1;

  const sliceStart = (currentPage - 1) * PAGE_SIZE;
  const paged      = filtered.slice(sliceStart, sliceStart + PAGE_SIZE);

  document.getElementById("countLabel").textContent = `${total} รายการ`;

  // render pagination in both slots
  const pgHTML = paginationHTML(totalPages);
  document.getElementById("paginationTop").innerHTML    = pgHTML;
  document.getElementById("paginationBottom").innerHTML = pgHTML;

  const tbody = document.getElementById("logsBody");
  const empty = document.getElementById("emptyState");

  if (!paged.length) {
    tbody.innerHTML      = "";
    empty.style.display  = "block";
    attachPagination(totalPages);
    return;
  }

  empty.style.display = "none";

  // ── desktop table ──
  tbody.innerHTML = paged.map(b => {
    const m          = ROOM_META[b.room] || { name: b.room, color: "#888" };
    const actionTime = b.deletedAt || b.rejectedAt || b.endedAt || b.createdAt;
    return `<tr>
      <td>
        <div class="title-cell">${esc(b.title || "—")}</div>
        ${b.description ? `<div class="desc-cell">${esc(b.description)}</div>` : ""}
      </td>
      <td>
        <div class="room-cell">
          <span class="room-dot" style="background:${m.color}"></span>
          ${m.name}
        </div>
      </td>
      <td>
        <div class="time-cell">${fmtDate(b.start)}</div>
        <div class="time-sub">${fmtTime(b.start)} – ${fmtTime(b.end)}</div>
      </td>
      <td class="user-cell">${esc(b.user || "—")}</td>
      <td class="user-cell">${esc(b.court || "—")}</td>
      <td class="user-cell">${esc(b.phone || "—")}</td>
      <td>${statusBadge(b)}</td>
      <td>
        <div class="time-cell">${actionTime ? fmtDateTime(actionTime) : "—"}</div>
        ${b.deletedBy      ? `<div class="time-sub">โดย ${esc(b.deletedBy)}</div>`  : ""}
        ${b.rejectedReason ? `<div class="time-sub">${esc(b.rejectedReason)}</div>` : ""}
      </td>
    </tr>`;
  }).join("");

  // ── mobile cards ──
  const mobileCards = document.getElementById("mobileCards");
  if (mobileCards) {
    mobileCards.innerHTML = paged.map(b => {
      const m = ROOM_META[b.room] || { name: b.room, color: "#888" };
      const actionTime = b.deletedAt || b.rejectedAt || b.endedAt || b.createdAt;
      return `
      <div class="log-card">
        <div class="log-card-header">
          <div>
            <div class="log-card-title">${esc(b.title || "—")}</div>
            <div class="log-card-room">
              <span style="width:7px;height:7px;border-radius:50%;background:${m.color};display:inline-block"></span>
              ${m.name}
            </div>
          </div>
          ${statusBadge(b)}
        </div>
        <div class="log-card-meta">
          📅 ${fmtDate(b.start)} · ${fmtTime(b.start)} – ${fmtTime(b.end)}<br>
          👤 ${esc(b.user || "—")}
          ${b.court ? ` · 🏛 ${esc(b.court)}` : ""}
          ${b.phone ? `<br>📞 ${esc(b.phone)}` : ""}
          ${b.description ? `<br>📝 ${esc(b.description)}` : ""}
        </div>
        <div class="log-card-footer">
          <span class="log-card-time">${actionTime ? fmtDateTime(actionTime) : "—"}</span>
          ${b.rejectedReason ? `<span style="font-size:11px;color:var(--danger)">${esc(b.rejectedReason)}</span>` : ""}
        </div>
      </div>`;
    }).join("");
  }

  attachPagination(totalPages);
}

function statusBadge(b) {
  const now = Date.now();
  switch (b.status) {
    case "pending":   return `<span class="badge pending">⏳ รออนุมัติ</span>`;
    case "rejected":  return `<span class="badge rejected">✕ ปฏิเสธ</span>`;
    case "deleted":   return `<span class="badge deleted">🗑 ลบแล้ว</span>`;
    case "completed": return `<span class="badge completed">✓ เสร็จสิ้น</span>`;
    case "approved":
      if (b.start && now < b.start.getTime()) return `<span class="badge incoming">🕐 กำลังจะมาถึง</span>`;
      if (b.end   && now < b.end.getTime())   return `<span class="badge active">🟢 กำลังดำเนินอยู่</span>`;
      return `<span class="badge approved">✓ อนุมัติแล้ว</span>`;
    default: return `<span class="badge">${esc(b.status)}</span>`;
  }
}

// ── FILTER EVENTS ─────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeStatus = btn.dataset.status;
    currentPage  = 1;
    renderTable();
  });
});

document.getElementById("roomFilter").addEventListener("change", e => {
  activeRoom  = e.target.value;
  currentPage = 1;
  renderTable();
});

document.getElementById("dateFilter").addEventListener("change", e => {
  activeDate  = e.target.value;
  currentPage = 1;
  renderTable();
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  currentPage = 1;
  renderTable();
});

// ── HELPERS ───────────────────────────────────────────────────
function fmtTime(d) {
  if (!d) return "—";
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")} น.`;
}
function fmtDate(d) {
  if (!d) return "—";
  const monthAbbr = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${d.getDate()} ${monthAbbr[d.getMonth()]} ${d.getFullYear()+543}`;
}
function fmtDateTime(d) {
  if (!d) return "—";
  const monthAbbr = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const dateStr = `${d.getDate()} ${monthAbbr[d.getMonth()]} ${d.getFullYear()+543}`;
  return `${dateStr} ${fmtTime(d)}`;
}
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

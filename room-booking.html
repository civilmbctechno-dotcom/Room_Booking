<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ห้องประชุม — มีนบุรี</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f10;
      --ink2: #1e1e22;
      --muted: #6b6b7a;
      --muted2: #9898a8;
      --line: #e4e4ea;
      --line2: #f0f0f5;
      --surface: #fafafc;
      --white: #ffffff;
      --accent: #2a5cff;
      --accent-bg: #eef2ff;
      --danger: #e84040;
      --danger-bg: #fff0f0;
      --success: #18b06a;
      --success-bg: #eafaf3;
      --warn: #f5a623;
      --warn-bg: #fff8ee;
      --room-1: #e84040;
      --room-2: #2a5cff;
      --room-3: #18b06a;
      --room-4: #9b59b6;
      --sidebar: 260px;
      --topbar: 64px;
      --hour-h: 60px;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--surface);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .status-badge.incoming  { background: #eef2ff; color: #2a5cff; }
.status-badge.active    { background: #eafaf3; color: #18b06a; }
.status-badge.rejected  { background: var(--danger-bg); color: var(--danger); }
.status-badge.deleted   { background: #f5eeff; color: #9b59b6; }
.status-badge.completed { background: #eafaf3; color: #18b06a; }

    .topbar {
      height: var(--topbar);
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-brand { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); white-space: nowrap; }
    .topbar-brand span { color: var(--accent); }

    .topbar-nav { display: flex; gap: 3px; background: var(--line2); padding: 3px; border-radius: 8px; }

    .view-btn {
      padding: 6px 13px; border: none; background: transparent; border-radius: 6px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .view-btn.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .nav-arrow-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--line); background: var(--white); border-radius: 8px;
      cursor: pointer; color: var(--muted); font-size: 16px; transition: all 0.15s; flex-shrink: 0;
    }
    .nav-arrow-btn:hover { border-color: #bbbbc8; color: var(--ink); }

    .date-label { font-weight: 500; font-size: 14px; color: var(--ink); min-width: 190px; text-align: center; white-space: nowrap; }

    .today-btn {
      padding: 6px 13px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .today-btn:hover { border-color: #bbbbc8; color: var(--ink); }

    .topbar-spacer { flex: 1; }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px 5px 5px; background: var(--surface);
      border: 1px solid var(--line); border-radius: 100px; white-space: nowrap;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--white); text-transform: uppercase; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; }
    .role-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.2px; }
    .role-badge.admin { background: var(--accent-bg); color: var(--accent); }
    .role-badge.user  { background: var(--success-bg); color: var(--success); }
    .role-badge.guest { background: var(--line2); color: var(--muted); }

    .logout-btn {
      padding: 6px 13px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .logout-btn:hover { border-color: #bbbbc8; color: var(--danger); }

    .guest-banner {
      background: var(--warn-bg); border-bottom: 1px solid rgba(245,166,35,0.3);
      padding: 8px 24px; font-size: 14px; color: #b07810;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .guest-banner a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .body-wrap { flex: 1; display: flex; overflow: hidden; }

    .sidebar {
      width: var(--sidebar); background: var(--white); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar-section { padding: 18px 16px 10px; }
    .sidebar-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted2); margin-bottom: 10px; }

    .room-filter {
      display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; transition: background 0.1s; user-select: none;
    }
    .room-filter:hover { background: var(--line2); }
    .room-filter.off { opacity: 0.35; }
    .room-filter-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .room-filter-info { flex: 1; min-width: 0; }
    .room-filter-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .room-filter-sub  { font-size: 11px; color: var(--muted2); margin-top: 1px; line-height: 1.4; }
    .room-filter-count { font-size: 11px; color: var(--muted2); flex-shrink: 0; margin-top: 3px; }

    .pending-panel { border-top: 1px solid var(--line); }
    .pending-item { padding: 12px 16px; border-bottom: 1px solid var(--line2); }
    .pending-item-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
    .pending-item-meta  { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
    .pending-actions    { display: flex; gap: 6px; }
    .btn-approve, .btn-reject {
      flex: 1; padding: 5px 0; border: none; border-radius: 6px;
      font-family: 'Sarabun', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-approve { background: var(--success-bg); color: var(--success); }
    .btn-reject  { background: var(--danger-bg);  color: var(--danger);  }
    .btn-approve:hover, .btn-reject:hover { opacity: 0.7; }
    .empty-pending { padding: 16px; font-size: 12px; color: var(--muted2); font-style: italic; }

    .calendar-wrap { flex: 1; overflow: auto; position: relative; }

    .cal-view { display: flex; flex-direction: column; min-height: 100%; }

    .rooms-header { display: grid; position: sticky; top: 0; z-index: 10; background: var(--white); border-bottom: 1px solid var(--line); }
    .room-header-cell { padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-left: 1px solid var(--line2); }
    .room-header-cell:first-child { border-left: none; }
    .room-header-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .room-header-name { font-size: 13px; font-weight: 600; }
    .room-header-sub  { font-size: 11px; color: var(--muted2); margin-top: 1px; }

    .time-grid { display: flex; flex: 1; }
    .time-labels { width: 50px; flex-shrink: 0; }
    .time-label {
      height: var(--hour-h); display: flex; align-items: flex-start;
      padding-top: 4px; justify-content: flex-end; padding-right: 8px;
      font-size: 10px; color: var(--muted2); font-variant-numeric: tabular-nums;
    }
    .rooms-grid { flex: 1; display: grid; position: relative; }
    .room-col { border-left: 1px solid var(--line2); position: relative; }
    .room-col:first-child { border-left: none; }
    .hour-row { height: var(--hour-h); border-bottom: 1px solid var(--line2); cursor: pointer; transition: background 0.1s; }
    .hour-row:hover { background: var(--accent-bg); }

    .booking-block {
      position: absolute; left: 3px; right: 3px; border-radius: 6px;
      padding: 5px 8px; cursor: pointer; overflow: hidden;
      transition: opacity 0.15s, transform 0.1s; z-index: 5;
    }
    .booking-block:hover { opacity: 0.85; transform: scaleX(0.97); }
    .booking-block.pending {
  background: transparent !important;
  border: 2px solid;
  opacity: 1;
}
    .booking-block-title { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .booking-block-time  { font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 1px; }

    .week-header { display: grid; position: sticky; top: 0; z-index: 10; background: var(--white); border-bottom: 1px solid var(--line); }
    .week-day-cell { padding: 10px 8px; border-left: 1px solid var(--line2); text-align: center; }
    .week-day-cell:first-child { border-left: none; }
    .week-day-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .week-day-num  { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink); line-height: 1; margin-top: 2px; }
    .week-day-cell.today .week-day-num {
      background: var(--accent); color: var(--white); width: 30px; height: 30px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center; font-size: 14px;
    }

    .month-header-row { display: grid; grid-template-columns: repeat(7,1fr); background: var(--white); border-bottom: 1px solid var(--line); }
    .month-day-name { padding: 10px 8px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); text-align: center; }
    .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--line); padding: 1px; }
    .month-cell { background: var(--white); min-height: 100px; padding: 7px; cursor: pointer; transition: background 0.1s; }
    .month-cell:hover { background: #f5f5fa; }
    .month-cell.other-month { background: var(--surface); }
    .month-date-num { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .month-cell.today .month-date-num {
      background: var(--accent); color: var(--white); width: 22px; height: 22px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center; font-size: 11px;
    }
    .month-event-pill {
      display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 500; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .month-event-pill.pending { opacity: 0.6; }
    .more-badge { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,15,16,0.5); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white); border-radius: 16px; width: 480px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
    .modal-header { padding: 22px 22px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 21px; letter-spacing: -0.3px; }
    .modal-close {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--line); background: var(--white); border-radius: 7px;
      cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s;
    }
    .modal-close:hover { border-color: #bbbbc8; color: var(--ink); }
    .modal-body { padding: 18px 22px; max-height: 65vh; overflow-y: auto; }
    .form-row { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .form-input, .form-select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--ink); background: var(--white);
      transition: border-color 0.15s; outline: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    .slot-btn {
      padding: 10px 8px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: center;
      font-family: 'Sarabun', sans-serif; color: var(--muted);
    }
    .slot-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .slot-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

    .divider-line {
      display: flex; align-items: center; gap: 10px; margin: 12px 0;
    }
    .divider-line::before, .divider-line::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }
    .divider-line span { font-size: 11px; color: var(--muted2); white-space: nowrap; }

    .conflict-warn {
      padding: 9px 13px; background: var(--danger-bg); border: 1px solid rgba(232,64,64,0.25);
      border-radius: 8px; font-size: 13px; color: var(--danger); margin-top: 12px; display: none;
    }
    .conflict-warn.show { display: block; }

    .modal-footer { padding: 14px 22px 22px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 18px; border: 1.5px solid var(--line); background: var(--white);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: #bbbbc8; color: var(--ink); }
    .btn-submit {
      padding: 9px 22px; border: none; background: var(--accent);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 600; color: var(--white); cursor: pointer; transition: all 0.15s;
    }
    .btn-submit:hover { background: #1a46e0; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .detail-room-tag {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px;
      border-radius: 100px; font-size: 12px; font-weight: 600; margin-bottom: 14px;
    }
    .detail-field { margin-bottom: 12px; }
    .detail-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted2); margin-bottom: 3px; }
    .detail-field-value { font-size: 14px; color: var(--ink); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-badge.approved { background: var(--success-bg); color: var(--success); }
    .status-badge.pending  { background: var(--warn-bg);    color: var(--warn);    }
    .btn-danger {
      padding: 9px 18px; border: none; background: var(--danger-bg);
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 14px;
      font-weight: 600; color: var(--danger); cursor: pointer; transition: opacity 0.15s;
    }
    .btn-danger:hover { opacity: 0.75; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink2); color: var(--white); padding: 11px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    .booking-block.completed-block {
  opacity: 0.45;
  filter: grayscale(60%);
  cursor: pointer;
  pointer-events: all;
}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">มีนบุรี <span>ห้องประชุม</span></div>
  <div class="topbar-nav">
    <button class="view-btn active" data-view="day">วัน</button>
    <button class="view-btn" data-view="week">สัปดาห์</button>
    <button class="view-btn" data-view="month">เดือน</button>
  </div>
  <button class="nav-arrow-btn" id="prevBtn">&#8249;</button>
  <div class="date-label" id="dateLabel">—</div>
  <button class="nav-arrow-btn" id="nextBtn">&#8250;</button>
  <button class="today-btn" id="todayBtn">วันนี้</button>
  <div class="topbar-spacer"></div>
  <div class="user-chip" id="userChip" style="display:none">
    <div class="user-avatar" id="userAvatar"></div>
    <span class="user-name" id="userName"></span>
    <span class="role-badge" id="roleBadge"></span>
  </div>
  <a href="logs.html" id="logsBtn" style="display:none;padding:6px 13px;border:1.5px solid var(--line);background:var(--white);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;white-space:nowrap;">📋 ประวัติ</a>
<button class="logout-btn" id="logoutBtn" style="display:none">ออกจากระบบ</button>
</div>

<div class="guest-banner" id="guestBanner" style="display:none">
  👁 คุณกำลังดูในฐานะผู้เยี่ยมชม — <a href="login.html">เข้าสู่ระบบ</a> เพื่อจองห้องประชุม
</div>

<div class="body-wrap">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">ห้องประชุม</div>
      <div id="roomFilters"></div>
    </div>
    <div class="sidebar-section pending-panel" id="pendingPanel" style="display:none">
      <div class="sidebar-title">รออนุมัติ</div>
      <div id="pendingList"></div>
    </div>
  </div>
  <div class="calendar-wrap" id="calendarWrap"></div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-backdrop" id="bookingModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">จองห้องประชุม</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">ศาล / หน่วยงาน</label>
        <input class="form-input" id="bookCourt" placeholder="ศาลแพ่งมีนบุรี" readonly style="background:var(--surface);color:var(--muted)" />
      </div>
      <div class="form-row">
        <label class="form-label">เบอร์โทรติดต่อ</label>
        <input class="form-input" id="bookPhone" type="tel" placeholder="0XX-XXX-XXXX" />
      </div>
      <div class="form-row">
        <label class="form-label">ชื่อการประชุม / กิจกรรม</label>
        <input class="form-input" id="bookTitle" placeholder="เช่น ประชุมทีมฝ่าย IT" />
      </div>
      <div class="form-row">
        <label class="form-label">รายละเอียด <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(ไม่บังคับ)</span></label>
        <textarea class="form-input" id="bookDesc" rows="3" placeholder="เช่น วาระการประชุม ผู้เข้าร่วม หมายเหตุ..." style="resize:vertical;line-height:1.5"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">ห้องที่ต้องการจอง</label>
        <select class="form-select" id="bookRoom">
          <option value="1">ห้องประชุม 1 ชั้น 5 — ห้องประชุมใหญ่ 29 ที่นั่ง</option>
          <option value="2">ห้องประชุม 2 ชั้น 5 — ห้องประชุมเล็ก 13 ที่นั่ง</option>
          <option value="3">ห้องประชุม 3 ชั้น 5 — ห้องประชุมเล็ก 13 ที่นั่ง</option>
          <option value="4">ห้องสมัครสโมสร ชั้น 2 — ห้องจัดเลี้ยง</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">วันที่</label>
        <input class="form-input" type="date" id="bookDate" />
      </div>
      <div class="form-row">
        <label class="form-label">เลือกช่วงเวลาด่วน</label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, onSnapshot, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIoOIk7O-oEt7yCgGGFq4w1ONXUuZBj0g",
  authDomain: "minburi-meeting-room-f34c4.firebaseapp.com",
  projectId: "minburi-meeting-room-f34c4",
  storageBucket: "minburi-meeting-room-f34c4.firebasestorage.app",
  messagingSenderId: "520841331829",
  appId: "1:520841331829:web:ad701c93283cd53b48243c"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const ROOMS = ["1","2","3","4"];
const ROOM_META = {
  "1": { name: "ห้องประชุม 1",    sub: "ชั้น 5 · ห้องประชุมใหญ่ 29 ที่นั่ง", color: "#e84040", bg: "rgba(232,64,64,0.12)"  },
  "2": { name: "ห้องประชุม 2",    sub: "ชั้น 5 · ห้องประชุมเล็ก 13 ที่นั่ง", color: "#2a5cff", bg: "rgba(42,92,255,0.12)"  },
  "3": { name: "ห้องประชุม 3",    sub: "ชั้น 5 · ห้องประชุมเล็ก 13 ที่นั่ง", color: "#18b06a", bg: "rgba(24,176,106,0.12)" },
  "4": { name: "ห้องสมัครสโมสร", sub: "ชั้น 2 · ห้องจัดเลี้ยง",              color: "#9b59b6", bg: "rgba(155,89,182,0.12)" }
};

const ADMIN_EMAILS = ["civilmbc.techno@gmail.com"];
const DAY_NAMES    = ["อา","จ","อ","พ","พฤ","ศ","ส"];
const MONTH_NAMES  = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                      "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const HOUR_START = 7;
const HOUR_END   = 19;
const HOUR_H     = 60;

const SLOTS = {
  morning:   { start: "08:30", end: "12:00" },
  afternoon: { start: "13:00", end: "16:30" },
  fullday:   { start: "08:30", end: "16:30" }
};

let currentUser   = null; // Firebase Auth user (Google login)
let localUser     = null; // username/password login user
let isAdmin       = false;
let isGuest       = false;
let bookings      = [];
let currentView   = "day";
let currentDate   = new Date();
let visibleRooms  = new Set(ROOMS);
let currentEditId = null;

// helper: get display name for bookings
function getBookingUser() {
  if (localUser) return localUser.username;
  if (currentUser) return currentUser.email;
  return "guest";
}

function getUserCourt() {
  return localUser?.court || "";
}

function getUserPhone() {
  return localUser?.phone || "";
}

// ── AUTH ─────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
isGuest = urlParams.get("guest") === "1";

if (isGuest) {
  document.getElementById("guestBanner").style.display = "flex";
  document.getElementById("userChip").style.display = "flex";
  document.getElementById("userAvatar").textContent = "ผ";
  document.getElementById("userName").textContent   = "ผู้เยี่ยมชม";
  const rb = document.getElementById("roleBadge");
  rb.textContent = "Guest"; rb.className = "role-badge guest";
  buildRoomFilters();
  loadBookings();
} else {
  // Check username/password session first
  const savedLocal = sessionStorage.getItem("localUser");
  if (savedLocal) {
    localUser = JSON.parse(savedLocal);
    isAdmin   = localUser.role === "admin";
    initLocalUI(localUser);
  } else {
    // Fall back to Firebase Auth (Google login)
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      currentUser = user;
      isAdmin = ADMIN_EMAILS.includes(user.email);
      initFirebaseUI(user);
    });
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  sessionStorage.removeItem("localUser");
  if (auth.currentUser) await signOut(auth);
  window.location.href = "login.html";
});

function initLocalUI(u) {
  document.getElementById("userChip").style.display = "flex";
  document.getElementById("userAvatar").textContent = u.displayName[0].toUpperCase();
  document.getElementById("userName").textContent   = u.displayName;
  const rb = document.getElementById("roleBadge");
  rb.textContent = isAdmin ? "ผู้ดูแล" : "ผู้ใช้งาน";
  rb.className   = "role-badge " + (isAdmin ? "admin" : "user");
  document.getElementById("logoutBtn").style.display = "block";
  if (isAdmin) {
    document.getElementById("pendingPanel").style.display = "block";
    document.getElementById("logsBtn").style.display = "block";
  }
  buildRoomFilters();
  loadBookings();
}

function initFirebaseUI(user) {
  document.getElementById("userChip").style.display = "flex";
  document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
  document.getElementById("userName").textContent   = user.email.split("@")[0];
  const rb = document.getElementById("roleBadge");
  rb.textContent = isAdmin ? "ผู้ดูแล" : "ผู้ใช้งาน";
  rb.className   = "role-badge " + (isAdmin ? "admin" : "user");
  document.getElementById("logoutBtn").style.display = "block";
  if (isAdmin) {
    document.getElementById("pendingPanel").style.display = "block";
    document.getElementById("logsBtn").style.display = "block";
  }
  buildRoomFilters();
  loadBookings();
}

// ── FIRESTORE ────────────────────────────────────────────────
function loadBookings() {
  onSnapshot(collection(db, "bookings"), (snap) => {
    // detect status changes for current user
    const myId = getBookingUser();
    snap.docChanges().forEach(change => {
      if (change.type === "modified") {
        const data = change.doc.data();
        if (data.user === myId && data.status === "rejected") {
          toast(`❌ คำขอจอง "${data.title}" ถูกปฏิเสธ`);
        }
        if (data.user === myId && data.status === "approved") {
          toast(`✅ คำขอจอง "${data.title}" ได้รับการอนุมัติแล้ว`);
        }
      }
    });

    bookings = [];
    snap.forEach(d => {
      const data = d.data();
      if (data.status === "rejected")  return;
      if (data.status === "deleted")   return;
      bookings.push({
        id: d.id, ...data,
        start: data.start?.toDate ? data.start.toDate() : new Date(data.start),
        end:   data.end?.toDate   ? data.end.toDate()   : new Date(data.end)
      });
    });
    renderCalendar();
    if (isAdmin) renderPending();
    updateRoomCounts();
    bookings.forEach(b => { if (b.status === "approved") scheduleAutoRemove(b); });
  });
}

async function addBooking(data) {
  await addDoc(collection(db, "bookings"), {
    ...data,
    user:      getBookingUser(),
    court:     getUserCourt(),
    phone:     data.phone || getUserPhone(),
    status:    "pending",
    createdAt: new Date()
  });
  toast("ส่งคำขอจองแล้ว — รอการอนุมัติจากผู้ดูแลระบบ");
}

async function approveBooking(id) {
  // 1. Approve the target booking
  await updateDoc(doc(db, "bookings", id), { status: "approved" });

  // 2. Find the booking we just approved
  const approved = bookings.find(b => b.id === id);
  if (approved) {
    // 3. Find all OTHER pending bookings that conflict with it
    const conflicts = bookings.filter(b => {
      if (b.id === id)              return false;
      if (b.status !== "pending")   return false;
      if (b.room !== approved.room) return false;
      const bStart = b.start instanceof Date ? b.start.getTime() : new Date(b.start).getTime();
      const bEnd   = b.end   instanceof Date ? b.end.getTime()   : new Date(b.end).getTime();
      const aStart = approved.start instanceof Date ? approved.start.getTime() : new Date(approved.start).getTime();
      const aEnd   = approved.end   instanceof Date ? approved.end.getTime()   : new Date(approved.end).getTime();
      return bStart < aEnd && bEnd > aStart;
    });

    // 4. Auto-reject them all
    await Promise.all(conflicts.map(b =>
  updateDoc(doc(db, "bookings", b.id), { status: "rejected", rejectedAt: new Date(), rejectedReason: "ซ้ำกับการจองที่อนุมัติแล้ว" })
));

    if (conflicts.length > 0) {
      toast(`อนุมัติแล้ว ✓ — ยกเลิก ${conflicts.length} คำขอที่ซ้ำกันอัตโนมัติ`);
    } else {
      toast("อนุมัติการจองเรียบร้อยแล้ว ✓");
    }
  } else {
    toast("อนุมัติการจองเรียบร้อยแล้ว ✓");
  }

  await loadBookings();
}

async function rejectBooking(id) {
  await updateDoc(doc(db, "bookings", id), { status: "rejected", rejectedAt: new Date() });
  await loadBookings();
  toast("ปฏิเสธคำขอจองแล้ว");
}

async function deleteBooking(id) {
  const b = bookings.find(x => x.id === id);
  if (b && isCurrentlyActive(b)) {
    toast("ไม่สามารถลบได้ — การประชุมกำลังดำเนินอยู่");
    return;
  }
  await updateDoc(doc(db, "bookings", id), {
    status: "deleted",
    deletedAt: new Date(),
    deletedBy: currentUser?.email || "unknown"
  });
  await loadBookings();
  closeDetail();
  toast("ลบการจองแล้ว");
}

// ── CONFLICT ─────────────────────────────────────────────────
function hasConflict(room, start, end, excludeId = null) {
  return bookings.some(b => {
    if (b.id === excludeId)     return false;
    if (b.room !== room)        return false;
    if (b.status === "pending") return false;

    // force to ms timestamps to avoid any object comparison issues
    const bStart = b.start instanceof Date ? b.start.getTime() : new Date(b.start).getTime();
    const bEnd   = b.end   instanceof Date ? b.end.getTime()   : new Date(b.end).getTime();
    const sTime  = start instanceof Date   ? start.getTime()   : new Date(start).getTime();
    const eTime  = end   instanceof Date   ? end.getTime()     : new Date(end).getTime();

    return sTime < bEnd && eTime > bStart;
  });
}

// ── ROOM FILTERS ─────────────────────────────────────────────
function buildRoomFilters() {
  const wrap = document.getElementById("roomFilters");
  wrap.innerHTML = "";
  ROOMS.forEach(r => {
    const m  = ROOM_META[r];
    const el = document.createElement("div");
    el.className = "room-filter"; el.dataset.room = r;
    el.innerHTML = `
      <div class="room-filter-dot" style="background:${m.color}"></div>
      <div class="room-filter-info">
        <div class="room-filter-name">${m.name}</div>
        <div class="room-filter-sub">${m.sub}</div>
      </div>
      <span class="room-filter-count" id="count-${r}">0</span>
    `;
    el.addEventListener("click", () => {
      if (visibleRooms.has(r)) {
        if (visibleRooms.size === 1) return;
        visibleRooms.delete(r); el.classList.add("off");
      } else {
        visibleRooms.add(r); el.classList.remove("off");
      }
      renderCalendar();
    });
    wrap.appendChild(el);
  });
}

function updateRoomCounts() {
  const today = new Date();
  ROOMS.forEach(r => {
    const el = document.getElementById("count-" + r);
    if (!el) return;
    el.textContent = bookings.filter(b =>
      b.room === r && b.status === "approved" &&
      b.start >= startOfDay(today) && b.start < endOfDay(today)
    ).length;
  });
}

// ── PENDING PANEL ─────────────────────────────────────────────
function renderPending() {
  const list    = document.getElementById("pendingList");
  const pending = bookings.filter(b => b.status === "pending");
  if (!pending.length) {
    list.innerHTML = '<div class="empty-pending">ไม่มีรายการรออนุมัติ</div>';
    return;
  }
  list.innerHTML = "";
  pending.forEach(b => {
    const el = document.createElement("div");
    el.className = "pending-item";
    el.innerHTML = `
      <div class="pending-item-title">${esc(b.title)}</div>
      <div class="pending-item-meta">
        ${ROOM_META[b.room]?.name || b.room}<br>
        ${fmtDT(b.start)} – ${fmtTime(b.end)}<br>
        <span style="color:var(--muted2)">${esc(b.user)}</span>
        ${b.court ? `<br><span style="color:var(--muted2)">🏛 ${esc(b.court)}</span>` : ""}
        ${b.phone ? `<br><span style="color:var(--muted2)">📞 ${esc(b.phone)}</span>` : ""}
      </div>
      <div class="pending-actions">
        <button class="btn-approve">✓ อนุมัติ</button>
        <button class="btn-reject">✕ ปฏิเสธ</button>
      </div>
    `;
    el.querySelector(".btn-approve").onclick = () => approveBooking(b.id);
    el.querySelector(".btn-reject").onclick  = () => rejectBooking(b.id);
    list.appendChild(el);
  });
}

// ── CALENDAR ─────────────────────────────────────────────────
function renderCalendar() {
  updateDateLabel();
  if      (currentView === "day")   renderDayView();
  else if (currentView === "week")  renderWeekView();
  else                               renderMonthView();
}

function renderDayView() {
  const wrap    = document.getElementById("calendarWrap");
  const visible = ROOMS.filter(r => visibleRooms.has(r));
  let html = `<div class="cal-view">`;
  html += `<div class="rooms-header" style="grid-template-columns:50px repeat(${visible.length},1fr)"><div></div>`;
  visible.forEach(r => {
    const m = ROOM_META[r];
    html += `<div class="room-header-cell">
      <div class="room-header-dot" style="background:${m.color}"></div>
      <div><div class="room-header-name">${m.name}</div><div class="room-header-sub">${m.sub}</div></div>
    </div>`;
  });
  html += `</div><div class="time-grid"><div class="time-labels">`;
  for (let h = HOUR_START; h < HOUR_END; h++) {
    html += `<div class="time-label">${String(h).padStart(2,"0")}:00</div>`;
  }
  html += `</div><div class="rooms-grid" style="grid-template-columns:repeat(${visible.length},1fr)">`;
  visible.forEach(r => {
    const m = ROOM_META[r]; const dayStart = startOfDay(currentDate);
    html += `<div class="room-col">`;
    for (let h = HOUR_START; h < HOUR_END; h++) {
      html += `<div class="hour-row" data-room="${r}" data-hour="${h}"></div>`;
    }
    bookings.filter(b => b.room === r && b.start < endOfDay(currentDate) && b.end > startOfDay(currentDate)).forEach(b => {
      const topPx    = ((b.start - dayStart) / 3600000 - HOUR_START) * HOUR_H;
      const heightPx = Math.max(((b.end - b.start) / 3600000) * HOUR_H, 22);
      const isCompleted = b.status === "completed";
const isPending   = b.status === "pending";
html += `<div class="booking-block ${isPending ? "pending" : ""} ${isCompleted ? "completed-block" : ""}"
  style="top:${topPx}px;height:${heightPx}px;
         background:${isPending ? "transparent" : m.color};
         border-color:${m.color}" data-id="${b.id}">
  <div class="booking-block-title" style="color:${isPending ? m.color : "#fff"}">${esc(b.title)}</div>
  <div class="booking-block-time" style="color:${isPending ? m.color : "rgba(255,255,255,0.8)"}">${fmtTime(b.start)} – ${fmtTime(b.end)}</div>
  ${isCompleted ? `<div style="font-size:9px;color:rgba(255,255,255,0.8);margin-top:2px">✓ เสร็จสิ้น</div>` : ""}
</div>`;
    });
    html += `</div>`;
  });
  html += `</div></div></div>`;
  wrap.innerHTML = html; wrap.scrollTop = 0; attachCalEvents(wrap);
}

function renderWeekView() {
  const wrap      = document.getElementById("calendarWrap");
  const today     = new Date();
  const weekStart = startOfWeek(currentDate);
  const days      = Array.from({length:7}, (_,i) => {
    const d = new Date(weekStart); d.setDate(d.getDate() + i); return d;
  });
  const visible = ROOMS.filter(r => visibleRooms.has(r));

  let html = `<div class="cal-view">`;

  // ── HEADER: day names, each day split into visible.length sub-cols ──
  html += `<div class="rooms-header" style="grid-template-columns:50px repeat(${days.length * visible.length},1fr)">`;
  html += `<div></div>`;
  days.forEach(d => {
    const isToday = sameDay(d, today);
    // span across all room sub-cols for this day
    html += `<div class="room-header-cell" style="grid-column:span ${visible.length};justify-content:center;border-left:1px solid var(--line2)">
      <div style="text-align:center">
        <div class="week-day-name" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)">${DAY_NAMES[d.getDay()]}</div>
        <div class="week-day-num ${isToday ? 'today-num' : ''}" style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);line-height:1;margin-top:2px;${isToday ? 'background:var(--accent);color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;' : ''}">${d.getDate()}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // ── ROOM SUB-HEADER ──
  html += `<div class="rooms-header" style="grid-template-columns:50px repeat(${days.length * visible.length},1fr);border-top:none">`;
  html += `<div></div>`;
  days.forEach(() => {
    visible.forEach(r => {
      const m = ROOM_META[r];
      html += `<div style="padding:5px 6px;border-left:1px solid var(--line2);display:flex;align-items:center;gap:5px;min-width:0">
        <span style="width:7px;height:7px;border-radius:50%;background:${m.color};flex-shrink:0"></span>
        <span style="font-size:10px;font-weight:600;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</span>
      </div>`;
    });
  });
  html += `</div>`;

  // ── TIME GRID ──
  html += `<div class="time-grid"><div class="time-labels">`;
  for (let h = HOUR_START; h < HOUR_END; h++) {
    html += `<div class="time-label">${String(h).padStart(2,"0")}:00</div>`;
  }
  html += `</div>`;

  html += `<div class="rooms-grid" style="grid-template-columns:repeat(${days.length * visible.length},1fr)">`;

  days.forEach(d => {
    const dayStart = startOfDay(d);
    visible.forEach(r => {
      const m = ROOM_META[r];
      html += `<div class="room-col">`;
      for (let h = HOUR_START; h < HOUR_END; h++) {
        html += `<div class="hour-row" data-date="${d.toISOString()}" data-room="${r}" data-hour="${h}"></div>`;
      }
      // bookings for this room on this day
      bookings
        .filter(b => b.room === r && b.start < endOfDay(d) && b.end > startOfDay(d))
        .forEach(b => {
          const topPx    = ((b.start - dayStart) / 3600000 - HOUR_START) * HOUR_H;
          const heightPx = Math.max(((b.end - b.start) / 3600000) * HOUR_H, 18);
          const isPending   = b.status === "pending";
const isCompleted = b.status === "completed";
html += `<div class="booking-block ${isPending ? "pending" : ""} ${isCompleted ? "completed-block" : ""}"
  style="top:${topPx}px;height:${heightPx}px;
         background:${isPending ? "transparent" : m.color};
         border-color:${m.color}"
  data-id="${b.id}">
  <div class="booking-block-title" style="color:${isPending ? m.color : "#fff"};font-size:10px">${esc(b.title)}</div>
  ${isCompleted ? `<div style="font-size:9px;color:rgba(255,255,255,0.8)">✓ เสร็จสิ้น</div>` : ""}
</div>`;
        });
      html += `</div>`;
    });
  });

  html += `</div></div></div>`;
  wrap.innerHTML = html;
  wrap.scrollTop = 0;
  attachCalEvents(wrap);
}

function renderMonthView() {
  const wrap = document.getElementById("calendarWrap"); const today = new Date();
  const year = currentDate.getFullYear(); const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1); const lastDay = new Date(year, month+1, 0);
  const totalCells = Math.ceil((firstDay.getDay() + lastDay.getDate()) / 7) * 7;
  let html = `<div><div class="month-header-row">`;
  DAY_NAMES.forEach(n => { html += `<div class="month-day-name">${n}</div>`; });
  html += `</div><div class="month-grid">`;
  for (let i = 0; i < totalCells; i++) {
    const d = new Date(firstDay); d.setDate(1 - firstDay.getDay() + i);
    const otherMonth = d.getMonth() !== month; const isToday = sameDay(d, today);
    const dayBookings = bookings.filter(b => visibleRooms.has(b.room) && sameDay(b.start, d));
    html += `<div class="month-cell ${otherMonth?"other-month":""} ${isToday?"today":""}" data-date="${d.toISOString()}">`;
    html += `<div class="month-date-num">${d.getDate()}</div>`;
    dayBookings.slice(0,3).forEach(b => {
      const m = ROOM_META[b.room];
      html += `<div class="month-event-pill ${b.status}" style="background:${m.bg};color:${m.color}" data-id="${b.id}">
        <span style="width:5px;height:5px;border-radius:50%;background:${m.color};display:inline-block;flex-shrink:0"></span>
        ${esc(b.title)}
      </div>`;
    });
    if (dayBookings.length > 3) html += `<div class="more-badge">+${dayBookings.length-3} รายการ</div>`;
    html += `</div>`;
  }
  html += `</div></div>`;
  wrap.innerHTML = html; attachCalEvents(wrap);
}

function attachCalEvents(wrap) {
  // day-view columns (have data-room)
  wrap.querySelectorAll(".hour-row[data-room]").forEach(el => {
    el.addEventListener("click", () => {
      if (isGuest) return;
      const start = new Date(currentDate);
      start.setHours(parseInt(el.dataset.hour), 0, 0, 0);
      openBookingModal(el.dataset.room, start);
    });
  });
  // week-view columns (have data-date, no data-room)
  wrap.querySelectorAll(".hour-row[data-date]").forEach(el => {
    el.addEventListener("click", () => {
      if (isGuest) return;
      const start = new Date(el.dataset.date);
      start.setHours(parseInt(el.dataset.hour), 0, 0, 0);
      openBookingModal(ROOMS[0], start);
    });
  });
  wrap.querySelectorAll(".booking-block").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const b = bookings.find(x => x.id === el.dataset.id);
      if (b) openDetailModal(b);
    });
  });
  wrap.querySelectorAll(".month-cell").forEach(el => {
    el.addEventListener("click", () => {
      if (isGuest) return;
      const d = new Date(el.dataset.date); d.setHours(9,0,0,0);
      openBookingModal(ROOMS[0], d);
    });
  });
  wrap.querySelectorAll(".month-event-pill").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const b = bookings.find(x => x.id === el.dataset.id);
      if (b) openDetailModal(b);
    });
  });
}

// ── TIME DROPDOWNS ────────────────────────────────────────────
function populateTimeSelects() {
  const startSel = document.getElementById("bookStart");
  const endSel   = document.getElementById("bookEnd");
  startSel.innerHTML = "";
  endSel.innerHTML   = "";
  for (let h = HOUR_START; h < HOUR_END; h++) {
    for (let m = 0; m < 60; m += 30) {
      const label = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      startSel.innerHTML += `<option value="${label}">${label}</option>`;
      endSel.innerHTML   += `<option value="${label}">${label}</option>`;
    }
  }
}

// ── SLOT BUTTONS ─────────────────────────────────────────────
document.querySelectorAll(".slot-btn").forEach(btn => {
  btn.addEventListener("click", () => selectSlot(btn.dataset.slot));
});

function selectSlot(key) {
  document.querySelectorAll(".slot-btn").forEach(b => b.classList.toggle("active", b.dataset.slot === key));
  const s = SLOTS[key];
  if (!s) return;
  document.getElementById("bookStart").value = s.start;
  document.getElementById("bookEnd").value   = s.end;
  checkConflict();
}

// ── BOOKING MODAL ─────────────────────────────────────────────
function openBookingModal(room, start, editId = null) {
  // 1. Populate dropdowns FIRST (must exist before setting .value)
  populateTimeSelects();

  // 2. Set field values
  currentEditId = editId;
  document.getElementById("bookRoom").value  = room;
  document.getElementById("bookDate").value  = toLocalDateValue(start);
  document.getElementById("bookCourt").value = getUserCourt();
  document.getElementById("bookPhone").value = getUserPhone();
  document.getElementById("conflictWarn").classList.remove("show");
  document.getElementById("modalSubmit").disabled = false;
  document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("active"));

  if (editId) {
    // editing: pre-fill title and match times to dropdowns
    const b = bookings.find(x => x.id === editId);
    if (b) {
      document.getElementById("bookTitle").value = b.title;
document.getElementById("bookDesc").value  = b.description || "";
      const startVal = `${String(b.start.getHours()).padStart(2,"0")}:${String(b.start.getMinutes()).padStart(2,"0")}`;
      const endVal   = `${String(b.end.getHours()).padStart(2,"0")}:${String(b.end.getMinutes()).padStart(2,"0")}`;
      document.getElementById("bookStart").value = startVal;
      document.getElementById("bookEnd").value   = endVal;
      // highlight matching slot if any
      for (const [key, s] of Object.entries(SLOTS)) {
        if (s.start === startVal && s.end === endVal) { selectSlot(key); break; }
      }
    }
  } else {
    document.getElementById("bookTitle").value = "";
document.getElementById("bookDesc").value  = "";
    // default: pick morning slot
    selectSlot("morning");
  }

  document.getElementById("modalTitle").textContent   = editId ? "แก้ไขการจอง" : "จองห้องประชุม";
  document.getElementById("modalSubmit").textContent  = editId ? "บันทึกการแก้ไข" : "ส่งคำขอจอง";
  document.getElementById("bookingModal").classList.add("open");
  setTimeout(() => document.getElementById("bookTitle").focus(), 100);
}

function closeBookingModal() {
  document.getElementById("bookingModal").classList.remove("open");
  currentEditId = null;
  document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("active"));
}

document.getElementById("modalClose").onclick  = closeBookingModal;
document.getElementById("modalCancel").onclick = closeBookingModal;
document.getElementById("bookingModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeBookingModal(); });

// manual dropdown changes → deactivate slot buttons, re-check conflict
["bookStart","bookEnd"].forEach(id => {
  document.getElementById(id).addEventListener("change", () => {
    document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("active"));
    checkConflict();
  });
});
["bookRoom","bookDate"].forEach(id => {
  document.getElementById(id).addEventListener("change", checkConflict);
});

function checkConflict() {
  const { start, end } = getModalDateTimes();
  if (!start || !end || start.getTime() >= end.getTime()) return;
  const conflict = hasConflict(document.getElementById("bookRoom").value, start, end, currentEditId);
  document.getElementById("conflictWarn").classList.toggle("show", conflict);
  document.getElementById("modalSubmit").disabled = conflict;
}

document.getElementById("modalSubmit").addEventListener("click", async () => {
  const title = document.getElementById("bookTitle").value.trim();
  const desc  = document.getElementById("bookDesc").value.trim();
  const room  = document.getElementById("bookRoom").value;
  const phone = document.getElementById("bookPhone").value.trim();
  const { start, end } = getModalDateTimes();

  if (!title) { document.getElementById("bookTitle").focus(); return; }
  if (!start || !end || start >= end) { toast("กรุณาเลือกช่วงเวลา"); return; }
  if (hasConflict(room, start, end, currentEditId)) { toast("เวลาซ้ำกัน — กรุณาเลือกช่วงเวลาอื่น"); return; }

  document.getElementById("modalSubmit").disabled = true;

  if (currentEditId) {
    await updateDoc(doc(db, "bookings", currentEditId), {
      title, description: desc, room, start, end, phone,
      status: "pending", editedAt: new Date()
    });
    toast("แก้ไขการจองแล้ว — รอการอนุมัติใหม่อีกครั้ง");
  } else {
    await addBooking({ room, start, end, title, description: desc, phone });
  }
  closeBookingModal();
});

// ── DETAIL MODAL ──────────────────────────────────────────────
function openDetailModal(b) {
  const m = ROOM_META[b.room] || { name: b.room, color: "#888", bg: "#eee" };
  document.getElementById("detailBody").innerHTML = `
    <div class="detail-room-tag" style="background:${m.bg};color:${m.color}">
      <span style="width:8px;height:8px;border-radius:50%;background:${m.color};display:inline-block"></span>
      ${m.name}
    </div>
    <div class="detail-field">
      <div class="detail-field-label">ชื่อการประชุม</div>
      <div class="detail-field-value" style="font-size:18px;font-weight:600">${esc(b.title)}</div>
    </div>
    ${b.description ? `
    <div class="detail-field">
      <div class="detail-field-label">รายละเอียด</div>
      <div class="detail-field-value" style="line-height:1.6;white-space:pre-wrap">${esc(b.description)}</div>
    </div>` : ""}
    <div class="detail-field">
      <div class="detail-field-label">เวลา</div>
      <div class="detail-field-value">${fmtDT(b.start)} – ${fmtDT(b.end)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">จองโดย</div>
      <div class="detail-field-value">${esc(b.user)}</div>
    </div>
    ${b.court ? `<div class="detail-field">
      <div class="detail-field-label">ศาล / หน่วยงาน</div>
      <div class="detail-field-value">${esc(b.court)}</div>
    </div>` : ""}
    ${b.phone ? `<div class="detail-field">
      <div class="detail-field-label">เบอร์โทรติดต่อ</div>
      <div class="detail-field-value">${esc(b.phone)}</div>
    </div>` : ""}
    <div class="detail-field">
      <div class="detail-field-label">สถานะ</div>
      <span class="status-badge ${getStatusClass(b)}">
  ${getStatusLabel(b)}
</span>
    </div>
  `;

  const footer = document.getElementById("detailFooter");
  footer.innerHTML = "";

  const closeBtn = document.createElement("button");
  closeBtn.className = "btn-cancel"; closeBtn.textContent = "ปิด"; closeBtn.onclick = closeDetail;
  footer.appendChild(closeBtn);

  const canEdit = !isGuest && (isAdmin || (currentUser && b.user === currentUser.email));
  if (canEdit) {
    const editBtn = document.createElement("button");
    editBtn.className   = "btn-cancel";
    editBtn.textContent = "✏️ แก้ไข";
    editBtn.onclick = () => {
      closeDetail();
      openBookingModal(b.room, b.start, b.id);
    };
    footer.appendChild(editBtn);
  }

  const canDelete = !isGuest && (isAdmin || (currentUser && b.user === currentUser.email));
  if (canDelete) {
    const delBtn = document.createElement("button");
    delBtn.className   = "btn-danger";
    delBtn.textContent = isAdmin ? "ลบการจอง" : "ยกเลิกการจอง";
if (isCurrentlyActive(b)) {
  delBtn.disabled = true;
  delBtn.style.opacity = "0.4";
  delBtn.style.cursor  = "not-allowed";
  delBtn.title = "การประชุมกำลังดำเนินอยู่";
}
delBtn.onclick = () => deleteBooking(b.id);
    footer.appendChild(delBtn);
  }

  if (isAdmin && b.status === "pending") {
    const apprBtn = document.createElement("button");
    apprBtn.className   = "btn-submit";
    apprBtn.textContent = "อนุมัติ";
    apprBtn.onclick     = async () => { await approveBooking(b.id); closeDetail(); };
    footer.appendChild(apprBtn);
  }

  document.getElementById("detailModal").classList.add("open");
}

function closeDetail() { document.getElementById("detailModal").classList.remove("open"); }
document.getElementById("detailClose").onclick = closeDetail;
document.getElementById("detailModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeDetail(); });

// ── NAVIGATION ────────────────────────────────────────────────
document.querySelectorAll(".view-btn[data-view]").forEach(btn => {
  btn.addEventListener("click", () => {
    currentView = btn.dataset.view;
    document.querySelectorAll(".view-btn[data-view]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCalendar();
  });
});
document.getElementById("prevBtn").addEventListener("click",  () => navigate(-1));
document.getElementById("nextBtn").addEventListener("click",  () => navigate(1));
document.getElementById("todayBtn").addEventListener("click", () => { currentDate = new Date(); renderCalendar(); });

function navigate(dir) {
  const d = new Date(currentDate);
  if      (currentView === "day")   d.setDate(d.getDate() + dir);
  else if (currentView === "week")  d.setDate(d.getDate() + dir * 7);
  else                               d.setMonth(d.getMonth() + dir);
  currentDate = d; renderCalendar();
}

function updateDateLabel() {
  const el  = document.getElementById("dateLabel");
  const bey = currentDate.getFullYear() + 543;
  if (currentView === "day") {
    el.textContent = `${DAY_NAMES[currentDate.getDay()]} ที่ ${currentDate.getDate()} ${MONTH_NAMES[currentDate.getMonth()]} ${bey}`;
  } else if (currentView === "week") {
    const ws = startOfWeek(currentDate);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    el.textContent = `${ws.getDate()} – ${we.getDate()} ${MONTH_NAMES[we.getMonth()]} ${we.getFullYear()+543}`;
  } else {
    el.textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${bey}`;
  }
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}

// ── HELPERS ───────────────────────────────────────────────────
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d)   { const x = new Date(d); x.setHours(23,59,59,999); return x; }
function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function fmtTime(d) {
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")} น.`;
}
function fmtDT(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${fmtTime(d)}`;
}

function getModalDateTimes() {
  const dateVal  = document.getElementById("bookDate").value;
  const startVal = document.getElementById("bookStart").value;
  const endVal   = document.getElementById("bookEnd").value;
  if (!dateVal || !startVal || !endVal) return { start: null, end: null };
  return {
    start: new Date(`${dateVal}T${startVal}`),
    end:   new Date(`${dateVal}T${endVal}`)
  };
}

function toLocalDateValue(d) {
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function esc(s) {
  return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function isCurrentlyActive(b) {
  if (b.status !== "approved") return false;
  const now = Date.now();
  return now >= b.start.getTime() && now < b.end.getTime();
}

function getStatusClass(b) {
  if (b.status === "pending")   return "pending";
  if (b.status === "rejected")  return "rejected";
  if (b.status === "deleted")   return "deleted";
  if (b.status === "completed") return "completed";
  if (b.status !== "approved")  return "pending";
  const now = Date.now();
  if (now < b.start.getTime()) return "incoming";
  if (now < b.end.getTime())   return "active";
  return "approved";
}

function getStatusLabel(b) {
  if (b.status === "pending")   return "⏳ รออนุมัติ";
  if (b.status === "rejected")  return "✕ ถูกปฏิเสธ";
  if (b.status === "deleted")   return "🗑 ลบแล้ว";
  if (b.status === "completed") return "✓ เสร็จสิ้น";
  if (b.status !== "approved")  return "⏳ รออนุมัติ";
  const now = Date.now();
  if (now < b.start.getTime()) return "🕐 กำลังจะมาถึง";
  if (now < b.end.getTime())   return "🟢 กำลังดำเนินอยู่";
  return "✓ อนุมัติแล้ว";
}

// track scheduled timers so we don't stack duplicates
const autoRemoveTimers = {};

async function scheduleAutoRemove(b) {
  if (b.status !== "approved") return;
  const msUntilEnd = b.end.getTime() - Date.now();
  if (msUntilEnd <= 0) {
    await updateDoc(doc(db, "bookings", b.id), { status: "completed", endedAt: new Date() });
    await loadBookings();
    return;
  }
  // clear any existing timer for this booking
  if (autoRemoveTimers[b.id]) clearTimeout(autoRemoveTimers[b.id]);
  autoRemoveTimers[b.id] = setTimeout(async () => {
    await updateDoc(doc(db, "bookings", b.id), {
      status: "completed",
      endedAt: new Date()
    });
    delete autoRemoveTimers[b.id];
    await loadBookings();
    toast("การประชุมสิ้นสุดแล้ว");
  }, msUntilEnd);
}
</script>
